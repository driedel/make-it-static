services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8123:8000"
    depends_on:
      - redis
    networks:
      - default
      - make-it-staticify-network

  worker:
    build: ./worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - minio
    networks:
      - default
      - make-it-staticify-network

  # ---- Local S3 for testing (remove in prod) ----
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # ---- Local static site preview (mirrors CloudFront) ----
  preview:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - minio
      - minio-init
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    env_file: .env

  # automatically creates the bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 $${AWS_ACCESS_KEY_ID} $${AWS_SECRET_ACCESS_KEY} &&
      mc mb -p local/$${S3_BUCKET} || true &&
      mc anonymous set download local/$${S3_BUCKET} &&
      echo 'Bucket ready.'
      "

volumes:
  redis-data:
  minio-data:

networks:
  make-it-staticify-network:
    external: true
